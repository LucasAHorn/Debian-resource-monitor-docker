services:
  nginx:
    image: nginx:stable-alpine
    container_name: dashboard-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    image: node:20-alpine
    container_name: resource-api
    working_dir: /app
    volumes:
      - ./api:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host-root:ro
      - /srv/fast:/srv/fast:ro
      - /srv/storage:/srv/storage:ro
    command: sh -c "apk add --no-cache docker-cli && npm install && node server.js"
    ports:
      - "5000:5000"
    restart: unless-stopped
